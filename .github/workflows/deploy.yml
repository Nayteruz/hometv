name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_FILM_LIST_KEY: ${{ secrets.VITE_API_FILM_LIST_KEY }}
          VITE_API_ALOHA_KEY: ${{ secrets.VITE_API_ALOHA_KEY }}
          VITE_API_HDTV_KEY: ${{ secrets.VITE_API_HDTV_KEY }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
